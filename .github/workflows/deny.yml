name: cargo-deny

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: "1.96.0"

      - name: Run cargo-deny
        # The Embark action installs the binary at $CARGO_HOME/bin/cargo-deny
        # but doesn't add it to PATH for subsequent steps. Invoke via the
        # explicit path. The binary itself is named 'cargo-deny' (not the
        # 'cargo deny' subcommand alias).
        run: "$CARGO_HOME/bin/cargo-deny" --all-features check