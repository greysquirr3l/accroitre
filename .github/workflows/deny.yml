name: cargo-deny

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  deny:
    name: deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # The Embark action runs cargo-deny inside its own Docker
      # container, so a follow-up `run:` step cannot reach the binary.
      # Pass everything through the action's inputs instead.
      # `rust-version` updates the toolchain inside the container
      # before cargo-deny runs; the workspace requires 1.96.0.
      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: "1.96.0"
          command: check
          arguments: --all-features
