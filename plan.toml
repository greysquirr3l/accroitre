    "Mock implementations can be created for testing.",
]
must_haves = [
    "All port traits are async",
    "All port traits are Send + Sync + 'static",
    "No concrete I/O types in trait signatures — only domain types",
    "ProgressPort is generic enough for both TUI and headless use",
]
evaluation_criteria = [
