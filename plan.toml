    "On Windows: use FSCTL_GET_RETRIEVAL_POINTERS (stretch goal — can stub initially).",
    "Sort entries by physical_offset for sequential disk reads.",
    "Support exclude patterns: glob-based file/directory exclusion.",
    "Use tokio::fs::read_dir for async directory walking.",
    "Emit progress events via ProgressPort during scanning.",
    "Handle symlinks: follow by default, skip with --no-follow option.",
    "Handle permission errors gracefully — log and continue, don't abort.",
]
test_hints = [
