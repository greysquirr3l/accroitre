goal       = "Define the pure domain layer: file metadata, copy plan, dedup index, and error types with no I/O dependencies."
depends_on = ["workspace-scaffold"]
hints = [
    "Place in accroitre crate under src/domain/.",
    "FileEntry: path (PathBuf), size (u64), hash (Option<Hash>), physical_offset (Option<u64>), permissions (u32).",
    "Hash: enum wrapping XxHash128([u8; 16]) and Blake3([u8; 32]).",
    "CopyPlan: source_root, dest_root, entries sorted by physical_offset, dedup_groups (Vec<Vec<usize>> mapping unique→duplicates).",
    "DedupGroup: canonical file index + Vec of duplicate file indices.",
    "CopyStats: files_total, files_copied, files_linked, files_skipped, files_errored, bytes_written, bytes_saved_dedup, elapsed.",
    "TransferMode enum: LocalToLocal, LocalToRemote, RemoteToLocal, RemoteToRemote.",
    "Error types with thiserror: ScanError, HashError, CopyError, VerifyError, SshError, SpaceError.",
    "No tokio, no I/O crates in this module — pure data types and traits only.",
]
test_hints = [
    "Unit test CopyPlan construction with sample FileEntry data.",
    "Test Hash equality and display formatting.",
    "Test error type conversions.",
]
must_haves = [
    "All domain types derive Debug, Clone where appropriate",
    "All domain types derive Serialize/Deserialize",
    "Zero I/O dependencies in the domain module",
    "Error types use thiserror with descriptive messages",
]
evaluation_criteria = [
    "No tokio, reqwest, or I/O imports in src/domain/",
    "All domain types implement Debug",
    "Error types provide sufficient context for diagnosis",
]

[[phases.tasks]]
slug       = "port-traits"
title      = "Port traits for file system, hashing, and transfer"
