depends_on = ["domain-types"]
hints = [
    "Place in accroitre crate under src/ports/.",
    "FileSystemPort: scan_tree, read_physical_offsets, check_free_space, create_hard_link, set_permissions.",
    "HasherPort: hash_file, hash_bytes — returns domain::Hash.",
    "CopierPort: copy_file (large files with buffer), stream_batch (small files via tar pipe).",
    "VerifierPort: verify_file (compare hash after copy).",
    "SshPort: connect, exec_command, open_channel, stream_tar_upload, stream_tar_download.",
    "CachePort: load_hash_cache, save_hash_cache, lookup_hash, store_hash — for cross-run dedup database.",
    "ProgressPort: on_scan_progress, on_hash_progress, on_copy_progress, on_verify_progress — for UI updates.",
    "All traits are async (use async fn in trait — Rust 2024 edition supports this).",
    "All traits are Send + Sync + 'static for use with tokio.",
    "Traits reference only domain types, never concrete adapter types.",
]
test_hints = [
