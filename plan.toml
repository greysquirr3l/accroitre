    "accroitre crate: src/lib.rs — library crate published to crates.io.",
    "accroitre-cli crate: src/main.rs with [[bin]] name = 'accro' — binary, not published.",
    "accroitre-cli depends on accroitre (path = '../accroitre').",
    "edition = '2024', rust-version = '1.94.1' in workspace.package.",
    "Add clippy.toml with msrv = '1.94.1'.",
    "Add rustfmt.toml: edition = '2024', imports_granularity = 'Crate', group_imports = 'StdExternalCrate'.",
    "Add deny.toml (cargo-deny) for license and advisory checks.",
    "Add build.rs in accroitre-cli that embeds the git SHA at compile time: cargo:rustc-env=ACCRO_GIT_SHA via `git rev-parse --short HEAD`. Rerun-if-changed on ../.git/HEAD and ../.git/refs/heads/. Fallback to 'unknown' if git is unavailable.",
    "In the CLI, expose version as `env!('CARGO_PKG_VERSION')` combined with `env!('ACCRO_GIT_SHA')` for output like '0.1.0 (abc1234)'.",
    "GitHub Actions CI: build + clippy + test on ubuntu-latest and macos-latest.",
    "Dual license: MIT OR Apache-2.0.",
]
test_hints = [
    "CI must pass: green build + clippy with -D warnings + cargo test.",
    "`cargo deny check` must pass.",
]
must_haves = [
    "Workspace Cargo.toml with edition = '2024' and rust-version = '1.94.1'",
    "Two crates: accroitre (lib) and accroitre-cli (bin, name = 'accro')",
    ".github/workflows/ci.yml runs build, clippy, test, and deny on ubuntu + macos",
    "clippy.toml, rustfmt.toml, deny.toml present",
    "LICENSE-MIT and LICENSE-APACHE present",
    "accroitre-cli/build.rs embeds git SHA via ACCRO_GIT_SHA env var",
]
evaluation_criteria = [
    "Workspace builds clean with zero clippy warnings under pedantic",
    "CI pipeline runs on both ubuntu-latest and macos-latest",
    "cargo-deny config covers licenses and advisories",
    "accroitre-cli binary is named 'accro'",
    "`accro version` outputs version string with git SHA (e.g. '0.1.0 (abc1234)')",
]

