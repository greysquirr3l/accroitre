# ─── Phase 7: Platform Optimization ──────────────────────────────────────────

[[phases]]
name  = "Platform Optimization"
order = 7

[[phases.tasks]]
slug       = "linux-optimizations"
title      = "Linux-specific I/O optimizations"
goal       = "Maximize throughput on Linux using io_uring, copy_file_range, splice, and sendfile."
depends_on = ["copy-engine"]
hints = [
    "Use io_uring (via tokio-uring or io-uring crate) for batched async I/O on supported kernels.",
    "copy_file_range(2): kernel-to-kernel copy, data never hits userspace.",
    "splice(2): zero-copy pipe-to-file and file-to-pipe transfers.",
    "sendfile(2): file-to-socket zero-copy for network transfers.",
    "Feature-gate behind a 'linux' feature flag for cross-compilation.",
    "Runtime detection: check kernel version for io_uring support, fall back gracefully.",
    "Direct I/O (O_DIRECT): optional for bypassing page cache on large sequential copies.",
]
test_hints = [
    "Test copy_file_range produces identical output to buffered copy.",
    "Benchmark: compare io_uring vs standard async I/O.",
    "Test graceful fallback on older kernels without io_uring.",
]
must_haves = [
    "copy_file_range used by default on Linux",
    "Graceful fallback when advanced features are unavailable",
    "No unsafe code without clear justification and encapsulation",
]
evaluation_criteria = [
    "copy_file_range is used for large file copies on Linux",
    "Falls back cleanly on kernels without io_uring",
    "Benchmarks show measurable throughput improvement",
]

[[phases.tasks]]
slug       = "macos-optimizations"
title      = "macOS-specific I/O optimizations"
goal       = "Maximize throughput on macOS using clonefile, fcopyfile, and APFS CoW."
depends_on = ["copy-engine"]
hints = [
    "clonefile(2): instant CoW copy on APFS — no data written, just metadata.",
    "fcopyfile(3): kernel-optimized copy with metadata preservation.",
    "fcntl F_LOG2PHYS: physical offset resolution already in scan engine.",
    "Detect APFS vs HFS+: clonefile only works on APFS, fall back to fcopyfile on HFS+.",
    "Feature-gate behind a 'macos' feature flag.",
    "F_NOCACHE: bypass unified buffer cache for large sequential reads.",
]
test_hints = [
    "Test clonefile produces a file that shares blocks (check with stat).",
    "Test fcopyfile preserves file metadata.",
    "Test fallback from clonefile to fcopyfile on HFS+.",
]
must_haves = [
    "clonefile used on APFS by default",
    "Graceful fallback to fcopyfile on non-APFS volumes",
    "Physical offset resolution via fcntl",
]
evaluation_criteria = [
    "clonefile produces instant copies on APFS",
    "Non-APFS volumes fall back gracefully",
    "Copy speed on APFS is near-instantaneous for dedup-eligible files",
]

